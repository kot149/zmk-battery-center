name: "Tauri Build"

on:
  workflow_dispatch:
    inputs:
      macos_aarch64:
        description: "macOS Apple Silicon (aarch64)"
        type: boolean
        default: true
      macos_x64:
        description: "macOS Intel (x86_64)"
        type: boolean
        default: true
      windows:
        description: "Windows x64"
        type: boolean
        default: true
      linux_x64:
        description: "Linux x64"
        type: boolean
        default: true
      linux_arm64:
        description: "Linux arm64"
        type: boolean
        default: true
  # pull_request:
  # push:
  #   paths-ignore:
  #     - '*.md'
  #     - .vscode

# This workflow will build your tauri app without uploading it anywhere.
jobs:
  select-platforms:
    runs-on: ubuntu-latest
    outputs:
      macos_aarch64: ${{ steps.flags.outputs.macos_aarch64 }}
      macos_x64: ${{ steps.flags.outputs.macos_x64 }}
      windows: ${{ steps.flags.outputs.windows }}
      linux_x64: ${{ steps.flags.outputs.linux_x64 }}
      linux_arm64: ${{ steps.flags.outputs.linux_arm64 }}
    steps:
      - id: flags
        shell: bash
        env:
          INC_MACOS_AARCH64: ${{ github.event_name != 'workflow_dispatch' || inputs.macos_aarch64 }}
          INC_MACOS_X64: ${{ github.event_name != 'workflow_dispatch' || inputs.macos_x64 }}
          INC_WINDOWS: ${{ github.event_name != 'workflow_dispatch' || inputs.windows }}
          INC_LINUX_X64: ${{ github.event_name != 'workflow_dispatch' || inputs.linux_x64 }}
          INC_LINUX_ARM64: ${{ github.event_name != 'workflow_dispatch' || inputs.linux_arm64 }}
        run: |
          set -euo pipefail
          on() { [[ "${1,,}" == "true" ]]; }
          ma=0 mx=0 win=0 lx=0 la=0
          on "$INC_MACOS_AARCH64" && ma=1
          on "$INC_MACOS_X64" && mx=1
          on "$INC_WINDOWS" && win=1
          on "$INC_LINUX_X64" && lx=1
          on "$INC_LINUX_ARM64" && la=1
          total=$(( ma + mx + win + lx + la ))
          if (( total < 1 )); then
            echo "Select at least one platform"
            exit 1
          fi
          echo "macos_aarch64=$([[ $ma -eq 1 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "macos_x64=$([[ $mx -eq 1 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "windows=$([[ $win -eq 1 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$([[ $lx -eq 1 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$([[ $la -eq 1 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  build-macos-aarch64:
    needs: select-platforms
    if: needs.select-platforms.outputs.macos_aarch64 == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/tauri-platform-build
        with:
          tauri-args: '--target aarch64-apple-darwin'
          rust-extra-targets: aarch64-apple-darwin
          ubuntu-deps: 'none'
          artifact-name: tauri-artifacts-macos-aarch64

  build-macos-x64:
    needs: select-platforms
    if: needs.select-platforms.outputs.macos_x64 == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/tauri-platform-build
        with:
          tauri-args: '--target x86_64-apple-darwin'
          rust-extra-targets: x86_64-apple-darwin
          ubuntu-deps: 'none'
          artifact-name: tauri-artifacts-macos-x64

  build-windows:
    needs: select-platforms
    if: needs.select-platforms.outputs.windows == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/tauri-platform-build
        with:
          ubuntu-deps: 'none'
          artifact-name: tauri-artifacts-windows

  build-linux-x64:
    needs: select-platforms
    if: needs.select-platforms.outputs.linux_x64 == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/tauri-platform-build
        with:
          tauri-args: '--target x86_64-unknown-linux-gnu'
          ubuntu-deps: 'x64'
          artifact-name: tauri-artifacts-linux-x64

  build-linux-arm64:
    needs: select-platforms
    if: needs.select-platforms.outputs.linux_arm64 == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/tauri-platform-build
        with:
          tauri-args: '--target aarch64-unknown-linux-gnu'
          ubuntu-deps: 'arm64'
          artifact-name: tauri-artifacts-linux-arm64
