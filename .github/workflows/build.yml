name: "Tauri Build"

on:
  workflow_dispatch:
    inputs:
      macos_aarch64:
        description: "macOS Apple Silicon (aarch64)"
        type: boolean
        default: true
      macos_x64:
        description: "macOS Intel (x86_64)"
        type: boolean
        default: true
      windows:
        description: "Windows x64"
        type: boolean
        default: true
      linux_x64:
        description: "Linux x64"
        type: boolean
        default: true
      linux_arm64:
        description: "Linux arm64"
        type: boolean
        default: true
  # pull_request:
  # push:
  #   paths-ignore:
  #     - '*.md'
  #     - .vscode

# This workflow will build your tauri app without uploading it anywhere.

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: bash
        env:
          INC_MACOS_AARCH64: ${{ github.event_name != 'workflow_dispatch' || inputs.macos_aarch64 }}
          INC_MACOS_X64: ${{ github.event_name != 'workflow_dispatch' || inputs.macos_x64 }}
          INC_WINDOWS: ${{ github.event_name != 'workflow_dispatch' || inputs.windows }}
          INC_LINUX_X64: ${{ github.event_name != 'workflow_dispatch' || inputs.linux_x64 }}
          INC_LINUX_ARM64: ${{ github.event_name != 'workflow_dispatch' || inputs.linux_arm64 }}
        run: |
          set -euo pipefail
          matrix=$(jq -nc \
            --arg ma "$INC_MACOS_AARCH64" \
            --arg mx "$INC_MACOS_X64" \
            --arg win "$INC_WINDOWS" \
            --arg lx "$INC_LINUX_X64" \
            --arg la "$INC_LINUX_ARM64" \
            'def on($x): ($x | ascii_downcase) == "true";
            [
              (if on($ma) then {"platform":"macos-latest","args":"--target aarch64-apple-darwin"} else empty end),
              (if on($mx) then {"platform":"macos-latest","args":"--target x86_64-apple-darwin"} else empty end),
              (if on($win) then {"platform":"windows-latest","args":""} else empty end),
              (if on($lx) then {"platform":"ubuntu-latest","args":"--target x86_64-unknown-linux-gnu"} else empty end),
              (if on($la) then {"platform":"ubuntu-24.04-arm","args":"--target aarch64-unknown-linux-gnu"} else empty end)
            ] | if length == 0 then error("Select at least one platform") else {include: .} end')
          {
            echo 'matrix<<EOF'
            echo "$matrix"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  build-tauri:
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu x64 only)
        if: matrix.platform == 'ubuntu-latest' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install dependencies (ubuntu arm64 only)
        if: matrix.platform == 'ubuntu-24.04-arm' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Restore bun cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install cargo-about
        run: cargo install cargo-about

      - name: Generate licenses
        run: bun scripts/generate_licenses.ts --skip-verify

      # If tagName and releaseId are omitted tauri-action will only build the app and won't try to upload any assets.
      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Convert artifact paths to relative and split (Unix)
        if: runner.os != 'Windows'
        id: relpath_unix
        run: |
          REL_PATHS=$(echo '${{ steps.tauri.outputs.artifactPaths }}' | jq -r '.[]' | sed "s#${{ github.workspace }}/##")
          echo "$REL_PATHS"
          echo "REL_PATHS<<EOF" >> $GITHUB_OUTPUT
          echo "$REL_PATHS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Convert artifact paths to relative and split (Windows)
        if: runner.os == 'Windows'
        id: relpath_win
        shell: pwsh
        run: |
          $paths = '${{ steps.tauri.outputs.artifactPaths }}' | ConvertFrom-Json
          $relPaths = $paths | ForEach-Object { $_ -replace [regex]::Escape("${{ github.workspace }}\"), "" }
          $relPathsString = $relPaths -join "`n"
          Write-Host $relPathsString
          "REL_PATHS<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $relPathsString | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload Tauri Artifacts
        if: env.ACT != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.args != '' && format('tauri-artifacts-{0}-{1}', matrix.platform, matrix.args) || format('tauri-artifacts-{0}', matrix.platform) }}
          path: |
            ${{ runner.os == 'Windows' && steps.relpath_win.outputs.REL_PATHS || steps.relpath_unix.outputs.REL_PATHS }}
